<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9B4CF7"/>
      <stop offset="40%"  stop-color="#8B3CF7"/>
      <stop offset="62%"  stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#5B19A0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.26"/>
      <stop offset="48%"  stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="58%"  stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glossBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.048"/>
    </filter>
    <filter id="topGlowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12.8"/>
    </filter>
    <clipPath id="clip">
      <rect width="512" height="512" rx="113"/>
    </clipPath>
    <clipPath id="topEdgeClip">
      <rect width="512" height="92.16"/>
    </clipPath>
    
    <!-- Engraved text effect (matches AppHeader CSS text-shadow) -->
    <filter id="engrave" x="-20%" y="-50%" width="140%" height="200%">
      <feOffset in="SourceAlpha" dx="0" dy="-20.70" result="s3off"/>
      <feGaussianBlur in="s3off" stdDeviation="20.70" result="s3blur"/>
      <feFlood flood-color="#000" flood-opacity="0.25" result="c3"/>
      <feComposite in="c3" in2="s3blur" operator="in" result="shadow3"/>
      <feOffset in="SourceAlpha" dx="0" dy="-13.80" result="s1off"/>
      <feFlood flood-color="#000" flood-opacity="0.4" result="c1"/>
      <feComposite in="c1" in2="s1off" operator="in" result="shadow1"/>
      <feOffset in="SourceAlpha" dx="0" dy="6.90" result="s2off"/>
      <feFlood flood-color="#fff" flood-opacity="0.22" result="c2"/>
      <feComposite in="c2" in2="s2off" operator="in" result="shadow2"/>
      <feMerge>
        <feMergeNode in="shadow3"/>
        <feMergeNode in="shadow1"/>
        <feMergeNode in="shadow2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gradient background, clipped to rounded rect -->
  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#shine)"/>
    <ellipse cx="256" cy="0" rx="409.6" ry="215.04"
             fill="url(#gloss)" filter="url(#glossBlur)"/>
    <rect x="4.096" y="4.096"
          width="503.808" height="503.808"
          rx="108.904" fill="none"
          stroke="rgba(255,255,255,0.35)" stroke-width="6.144"
          clip-path="url(#topEdgeClip)" filter="url(#topGlowBlur)"/>
  </g>

  <!-- Subtle dark border -->
  <rect width="512" height="512" rx="113" fill="none"
        stroke="rgba(0,0,0,0.28)" stroke-width="2.048"/>

  

  <!-- "b" glyph — stroke outline + engraved shadow (matching AppHeader style) -->
  <g filter="url(#engrave)">
    <g transform="translate(125.47, 409.90) scale(0.43785)">
      <path d="M376 11Q319 11 274.50-16.50Q230-44 216-89L227-81Q227-37 204.50-14Q182 9 140 9Q97 9 74.50-14Q52-37 52-81L52-624Q52-668 75-691Q98-714 140-714Q183-714 206.50-691Q230-668 230-624L230-410Q233-451 277-477Q321-503 376-503Q440-503 488.50-472Q537-441 564-384Q591-327 591-246Q591-167 564-109Q537-51 488.50-20Q440 11 376 11ZM320-120Q347-120 367.50-133.50Q388-147 400-174.50Q412-202 412-246Q412-313 386-342.50Q360-372 320-372Q293-372 272-359Q251-346 239-318.50Q227-291 227-246Q227-180 253-150Q279-120 320-120Z" fill="white"
            stroke="rgba(0,0,0,0.28)" stroke-width="24"
            stroke-linejoin="round" paint-order="stroke fill"/>
    </g>
  </g>
</svg>